<style>

    

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

/* BODY */
body {
  min-height: 100vh;
  background: radial-gradient(circle at center, #020617, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.navbar {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80px;
    width: 100%;
    position: fixed;
    top: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);
    z-index: 999;
}

.navbar-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0 2rem;
    max-width: 1600px;
}

.logo-img {
    height: 100px;
}

.navbar-menu {
    display: flex;
    gap: 1.5rem;
    list-style: none;
}

.navbar-menu li a {
    text-decoration: none;
    color: white;
    font-size: 1.2rem;
    padding: 5px 15px;
    border: 2px solid transparent;
    transition: 0.4s;
}

.navbar-menu li a:hover {
    background: rgba(33,33,33,0.7);
    border: 2px solid white;
}


.navbar-toggle {
    display: none;
    background: transparent;
    padding: 10px;
    border: none;
    cursor: pointer;
}

.bar {
    display: block;
    width: 25px;
    height: 3px;
    margin: 5px auto;
    background: white;
    transition: all 0.3s ease-in-out;
}

@media (max-width: 880px) {


    body {
     
     background-size: 600px 950px;
     background-attachment: fixed;
    }

    .navbar {
        backdrop-filter: none;

    }

    .navbar-container .navbar-menu {
        display: none;
        flex-direction: column;
        align-items: flex-start;
        gap: 1.7rem !important;
        position: absolute;
        height: 100vh;
        width: 250px;
        top: 0;
        right: 0;
        padding: 5rem 1.5rem;
        box-shadow: 0 10px 10px rgba(0,0,0,0.5);
        backdrop-filter: blur(100px);
    }


    .navbar-container .navbar-menu.active {
        display: flex;
    }



    .navbar-toggle {
        display: block;
        z-index: 999;
        /* so that it stays on top */
    }


    /* .navbar-toggle.active.bar:nth-child(2) {

     .navbar-toggle.active.bar:nth-child(1) {
        transform: translateY(8px) rotate(45deg);
    }

     .navbar-toggle.active.bar:nth-child(3) {
        transform: translateY(-8px) rotate(-45deg);
    } */
}


@media (max-width: 480px) {
    .navbar-container {
        padding: 0 1rem;
    }

    .navbar-logo {
        font-size: 1.7rem;
    }

    .navbar-container .navbar-menu li a {
        font-size: 1.2rem;
        padding: 3px 15px;
    }
}





/* MAIN CONTAINER */
.container {
  width: 100%;
  max-width: 1100px;
  border-radius: 20px;
  padding: 40px 25px;
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid rgba(255, 140, 0, 0.4);
  box-shadow: 0 0 25px rgba(255, 140, 0, 0.2);
}

/* SECTION TITLE */
.section-title {
  text-align: center;
  font-size: 28px;
  margin-bottom: 25px;
  position: relative;
}

.section-title::after {
  content: "";
  display: block;
  width: 120px;
  height: 2px;
  background: orange;
  margin: 10px auto;
}

/* CARD CONTAINER */
.card-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

/* CARD */
.card {
  flex: 1 1 280px;
  max-width: 320px;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  background: rgba(10, 10, 10, 0.7);
  border: 1px solid rgba(255, 140, 0, 0.3);
  transition: 0.4s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 20px orange;
}

/* ACTIVE CARD */
.card.active {
  border: 1px solid orange;
  box-shadow: 0 0 25px orange;
}

/* ICON */
.icon {
  width: 60px;
  height: 60px;
  margin: 0 auto 15px;
  background: orange;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.icon img {
  width: 60%;
  height: 60%;
  object-fit: contain;
  border-radius: 50%;
}

/* TEXT */
.card h3 {
  margin-bottom: 8px;
  font-size: 18px;
}

.card p {
  color: #f5c06f;
  font-size: 15px;
}

/* RESPONSIVE */

/* Tablet */
@media (max-width: 900px) {
  .card {
    flex: 1 1 45%;
  }
}

/* Mobile */
@media (max-width: 600px) {

  .section-title {
    font-size: 22px;
  }

  .container {
    padding: 25px 15px;
  }

  .card-container {
    flex-direction: column;
    align-items: center;
  }

  .card {
    width: 100%;
    max-width: 320px;
  }

  .card h3 {
    font-size: 16px;
  }

  .card p {
    font-size: 14px;
  }

  .icon {
    width: 50px;
    height: 50px;
  }
}

</style>
