<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register for INFERENCIA 2025</title>

<style>

/* ---------------- BODY ---------------- */
body {
    margin: 0;
    padding: 120px 0 40px; /* space for navbar */
    min-height: 100vh;
    background: linear-gradient(135deg, #070913 0%, #020306 100%);
    color: white;
    font-family: 'Georgia', 'Times New Roman', serif;
}

/* Background */
#background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  z-index: -1;
}

/* ---------------- NAVBAR ---------------- */
.navbar {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80px;
    width: 100%;
    position: fixed;
    top: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);
    z-index: 999;
}

.navbar-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0 2rem;
    max-width: 1600px;
}

.logo-img {
    height: 50px;
}

.navbar-menu {
    display: flex;
    gap: 1.5rem;
    list-style: none;
}

.navbar-menu li a {
    text-decoration: none;
    color: white;
    font-size: 1.2rem;
    padding: 5px 15px;
    border: 2px solid transparent;
    transition: 0.4s;
}

.navbar-menu li a:hover,
.navbar-menu li a.active {
    background: rgba(33,33,33,0.7);
    border: 2px solid white;
}

/* ---------------- CONTAINER ---------------- */
.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 50px 40px;
    text-align: center;

    display: flex;
    flex-direction: column;
    align-items: center;

    background: rgba(10, 12, 20, 0.7);
    border: 1px solid rgba(247, 160, 40, 0.15);
    border-radius: 15px;
    backdrop-filter: blur(8px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    transition: 0.4s;
}

.container:hover {
    transform: scale(1.01);
    border-color: rgba(247,160,40,0.6);
}

/* ---------------- TIMER ---------------- */
.countdown-wrapper {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
}

.time-box {
    background: rgba(247,160,40,0.1);
    border: 1px solid rgba(247,160,40,0.3);
    border-radius: 8px;
    padding: 10px 15px;
}

.time-box span {
    font-size: 2rem;
    color: #f7a028;
}

/* ---------------- TEXT ---------------- */
h1 {
    color: #f7a028;
    font-size: 2.5rem;
}

p {
    font-size: 1.2rem;
    color: #ddd;
}

/* ---------------- BUTTON ---------------- */
button {
    margin-top: 30px;
    padding: 1em 2em;
    background-color: gold;
    border: none;
    color: black;
    border-radius: 1000px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px goldenrod;
}

/* ---------------- RESPONSIVE ---------------- */
@media (max-width: 768px) {
    .navbar-menu {
        display: none;
    }

    .container {
        padding: 30px 20px;
    }

    h1 {
        font-size: 2rem;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="navbar-container">
        <a href="index.html">
            <img src="logo_bg_remv.png" class="logo-img">
        </a>

        <ul class="navbar-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="events.html">Event</a></li>
            <li><a href="index.html#gallery">Gallery</a></li>
            <li><a href="registration.html" class="active">Registration</a></li>
            <li><a href="contactus.html">Contact</a></li>
        </ul>
    </div>
</nav>

<!-- CONTENT -->
<div class="container">

    <!-- TIMER -->
    <div class="countdown-wrapper" id="timer">
        <div class="time-box"><span id="days">02</span></div>
        <div class="time-box"><span id="hours">00</span></div>
        <div class="time-box"><span id="minutes">00</span></div>
        <div class="time-box"><span id="seconds">00</span></div>
    </div>

    <h1>Register for INFERENCIA 2025</h1>

    <p>
        Get ready to dive into a world of excitement and unforgettable moments!
    </p>

    <p><b>Don't wait—your adventure starts here!</b></p>

    <!-- BUTTON -->
    <button>Register Here</button>

</div>

<!-- SCRIPT -->
<script>
const countdownTime = new Date().getTime() + (2 * 24 * 60 * 60 * 1000);

setInterval(function() {
    const now = new Date().getTime();
    const distance = countdownTime - now;

    document.getElementById("days").innerHTML = Math.floor(distance / (1000*60*60*24));
    document.getElementById("hours").innerHTML = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    document.getElementById("minutes").innerHTML = Math.floor((distance % (1000*60*60))/(1000*60));
    document.getElementById("seconds").innerHTML = Math.floor((distance % (1000*60))/1000);
}, 1000);
</script>

</body>
</html>
